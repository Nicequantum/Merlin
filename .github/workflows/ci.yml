name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test
          SESSION_SECRET: ci-test-session-secret-min-32-chars
          ENCRYPTION_KEY: ci-test-encryption-key-32b
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BLOB_READ_WRITE_TOKEN: ci-blob-token
          KV_REST_API_URL: https://ci-kv.example.com
          KV_REST_API_TOKEN: ci-kv-token
          GROK_API_KEY: ci-grok-key