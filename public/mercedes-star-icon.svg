      <stop offset="0%" stop-color="#f2f4f7"/>
      <stop offset="35%" stop-color="#b4bcc6"/>
      <stop offset="100%" stop-color="#5c656f"/>
    </linearGradient>
    <linearGradient id="mb-star" x1="30%" y1="8%" x2="70%" y2="92%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c5ced8"/>
